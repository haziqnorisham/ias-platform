version: '3.8'

services:
  # Redis Cache (completely internal)
  redis:
    image: redis:7-alpine
    container_name: ias-redis
    restart: unless-stopped
    expose:
      - "6379"  # Only exposes to linked containers, not to host
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ias-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Your API Service
  api:
    image: ias-api:0.01
    container_name: ias-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ias-public:/app/public
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ias-network
# Dozzle - The log viewer
  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    ports:
      - "8888:8080"  # Access the UI at http://localhost:8888
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
volumes:
  redis-data:
    driver: local
  ias-public:
    driver: local

networks:
  ias-network:
    driver: bridge